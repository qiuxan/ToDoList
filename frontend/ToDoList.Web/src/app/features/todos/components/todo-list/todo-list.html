<div class="todo-list">
  @for (todo of todos(); track todo.id) {
    <div class="todo-item" [class.done]="todo.isCompleted">
      <input
        class="todo-check"
        type="checkbox"
        [id]="'todo-' + todo.id"
        [checked]="todo.isCompleted"
      />

      <div class="todo-body">
        <label class="todo-title" [for]="'todo-' + todo.id">
          {{ todo.title }}
        </label>

        @if (todo.description) {
          <p class="todo-desc">{{ todo.description }}</p>
        }
      </div>
    </div>
  } @empty {
    <p class="empty-state">No tasks yet.</p>
  }
</div>
