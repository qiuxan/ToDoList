<div class="header">
  <h1>ToDo List</h1>
</div>

<app-add-todo-form (createRequested)="onCreateRequested($event)" />

@if (isCreating()) {
  <p class="status">Creating task...</p>
}

@if (isLoading()) {
  <p class="status">Loading tasks...</p>
}

@if (errorMessage()) {
  <p class="error">{{ errorMessage() }}</p>
}

<app-todo-list [todos]="todos()" (deleteRequested)="onDeleteRequested($event)" />
